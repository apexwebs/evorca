<style>
      .material-symbols-outlined {

      }
      .scanner-gradient {
        background: radial-gradient(circle, transparent 65%, rgba(0, 102, 102, 0.4) 100%);
      }
      .scan-line {
        height: 2px;
        background: linear-gradient(90deg, transparent, #d4af37, transparent);
        box-shadow: 0 0 15px #d4af37;
        position: absolute;
        width: 100%;
        top: 50%;
        animation: scan 3s infinite linear;
      }
      @keyframes scan {
        0% { top: 0%; }
        50% { top: 100%; }
        100% { top: 0%; }
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<!-- TopAppBar Small Implementation from COMPONENTS_16 -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-sm border-b border-slate-100/50 dark:border-slate-800/50">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-teal-100 dark:bg-teal-900/40 flex items-center justify-center overflow-hidden active:scale-95 duration-200 cursor-pointer">
<span class="material-symbols-outlined text-teal-800 dark:text-teal-200 text-lg" data-icon="person">person</span>
</div>
<h1 class="font-['Manrope'] tracking-tight font-bold text-lg text-teal-900 dark:text-teal-100">Gate Scanner</h1>
</div>

</button>

</div>
</div>
<!-- Scanner Window Overlay -->

<div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-evorca-gold rounded-tl-3xl shadow-[0_0_15px_rgba(212,175,55,0.3)]"></div>

<div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-evorca-gold rounded-br-3xl shadow-[0_0_15px_rgba(212,175,55,0.3)]"></div>
<!-- Scanning Animation Simulation -->
<div class="w-full h-full scanner-gradient rounded-3xl relative overflow-hidden flex items-center justify-center">
<div class="scan-line opacity-80"></div>
<div class="w-48 h-48 opacity-10">
<span class="material-symbols-outlined text-evorca-gold text-[120px]" data-icon="qr_code_scanner">qr_code_scanner</span>
</div>
</div>
</div>
<!-- Stats Bar -->
<div class="mt-8 z-10">
<div class="bg-slate-900/60 backdrop-blur-md px-6 py-2.5 rounded-full border border-teal-500/20 flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-evorca-gold shadow-[0_0_10px_#d4af37]"></div>
<span class="font-headline font-bold text-teal-50 tracking-[0.2em] text-[10px] uppercase">124 / 200 Checked In</span>
</div>

<!-- Floating Result Card (Success State) - Prestige Palette -->

</div>
<div class="absolute -bottom-1 -right-1 bg-teal-500 w-6 h-6 rounded-full border-4 border-slate-900 flex items-center justify-center">
<span class="material-symbols-outlined text-[12px] text-white font-black" data-icon="check">check</span>
</div>
</div>
<div>
<div class="flex items-center gap-2 mb-0.5">

<div class="flex items-center gap-1.5 text-teal-400">

</div>
</div>

<button class="bg-slate-800/80 w-11 h-11 rounded-2xl text-slate-400 active:scale-90 transition-transform flex items-center justify-center">
<span class="material-symbols-outlined text-xl" data-icon="info">info</span>

<div class="bg-teal-950/30 rounded-2xl p-4 border border-teal-500/10 flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-evorca-gold/10 flex items-center justify-center">
<span class="material-symbols-outlined text-evorca-gold" data-icon="priority_high" style="font-variation-settings: 'FILL' 1;">priority_high</span>
</div>
<div>
<p class="text-[10px] font-black text-teal-500/70 uppercase tracking-[0.15em]">Guest Provisions</p>
